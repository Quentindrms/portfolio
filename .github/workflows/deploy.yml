name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm run test

  build-and-push:
    runs-on: ubuntu-latest
    needs: test

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build app
        run: pnpm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push portfolio image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: prod.dockerfile
          push: true
          tags: ghcr.io/quentindrms/portfolio:latest
          cache-from: type=registry,ref=ghcr.io/quentindrms/portfolio:cache
          cache-to: type=registry,ref=ghcr.io/quentindrms/portfolio:cache,mode=max

      - name: Build and push nginx image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: nginx.dockerfile
          push: true
          tags: ghcr.io/quentindrms/portfolio-nginx:latest
          cache-from: type=registry,ref=ghcr.io/quentindrms/portfolio-nginx:cache
          cache-to: type=registry,ref=ghcr.io/quentindrms/portfolio-nginx:cache,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo ${{ secrets.VPS }} | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin
            docker pull ghcr.io/quentindrms/portfolio:latest
            docker pull ghcr.io/quentindrms/portfolio-nginx:latest
            docker compose -f /home/ubuntu/portfolio/compose.prod.yaml up -d --remove-orphans
            docker image prune -f
