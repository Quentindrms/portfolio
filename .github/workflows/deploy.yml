name: Deploy to vps

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
    - name: Code checkout
      uses: actions/checkout@v4

    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        version: latest

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Tests
      run: pnpm run test

    - name: Build app
      run: pnpm run build

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push portfolio image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: prod.dockerfile
        push: true
        tags: ghcr.io/${{ github.repository_owner }}/portfolio:latest

    - name: Build and push nginx image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: nginx.dockerfile
        push: true
        tags: ghcr.io/${{ github.repository_owner }}/portfolio-nginx:latest

    - name: SSH deployment
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          docker pull ghcr.io/quentindrms/portfolio:latest
          docker pull ghcr.io/quentindrms/portfolio-nginx:latest
          docker compose -f /home/ubuntu/portfolio/compose.prod.yaml up -d --remove-orphans
